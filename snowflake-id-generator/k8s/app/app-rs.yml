apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: app-replicaset
spec:
  replicas: 3 # Необходимое количества реплик
  selector:
    matchLabels:
      app: app # Селектор поиска (маппинга) объектов Pod для ReplicaSet
  template:
    metadata:
      labels:
        app: app # Метка Pod по которой ReplicaSet будет его искать
    spec:
      volumes:
        - name: workerid-volume
          emptyDir: { }
      initContainers:
        - name: generate-workerid
          image: busybox
          command:
            - sh
            - -c
            - |
              echo $((RANDOM % 10000)) > /data/workerId
          volumeMounts:
            - name: workerid-volume
              mountPath: /data
      containers:
        - name: app
          image: snowflake-nextid:1.0
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthy
              port: 8080
            initialDelaySeconds: 15
            timeoutSeconds: 2
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 5
            timeoutSeconds: 1
            periodSeconds: 5
            failureThreshold: 3
            successThreshold: 1
          volumeMounts:
            - name: workerid-volume
              mountPath: /data
