apiVersion: v1
kind: Service
metadata:
  name: app-service
spec:
  selector:
    app: app-service
  ports:
    - name: http
      port: 80 # Внутренний порт сервиса
      targetPort: 8080 # Порт контейнера
      nodePort: 30081 # Внешний порт узла (для доступа снаружи), допустимый диапазон 30000–32767
  type: NodePort
