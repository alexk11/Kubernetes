apiVersion: v1
kind: Pod
metadata:
  name: snowflake-nextid
spec:
  restartPolicy: Never
  containers:
  - image: snowflake-nextid:1.0
    name: snowflake-nextid
    env: # Параметры из ConfigMap подключаются как переменные окружения
      - name: LOG_LEVEL
        valueFrom:
          configMapKeyRef:
            name: app-config
            key: LOG_LEVEL
      - name: MESSAGE
        valueFrom:
          configMapKeyRef:
            name: app-config
            key: MESSAGE
    volumeMounts: # Параметры из ConfigMap подключаются как файл из хранилища
      - name: app-config-volume
        mountPath: /config
        readOnly: true
    ports:
      - containerPort: 8080
        name: http
        protocol: TCP
    livenessProbe:
      httpGet:
        path: /healthy
        port: 8080
      initialDelaySeconds: 70
      timeoutSeconds: 2
      periodSeconds: 20
      failureThreshold: 3
    readinessProbe:
      httpGet:
        path: /ready
        port: 8080
      initialDelaySeconds: 60
      timeoutSeconds: 1
      periodSeconds: 5
      failureThreshold: 3
      successThreshold: 1
  volumes: # Подключение ConfigMap к объекту Pod
    - name: app-config-volume
      configMap:
        name: app-config
